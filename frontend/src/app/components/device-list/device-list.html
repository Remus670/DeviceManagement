<div class="device-list-container">
  <div class="list-header">
    <h1>Device Inventory</h1>
    <button class="btn-primary" (click)="goToCreate()">+ Add Device</button>
  </div>

  <div class="loading" *ngIf="loading">Loading devices...</div>

  <div class="devices-grid" *ngIf="!loading">
    <div class="card device-card" *ngFor="let device of devices">
      <div class="device-card-header">
        <span class="device-type-badge">{{ device.type }}</span>
        <button class="btn-danger btn-sm" (click)="deleteDevice(device.id)">🗑</button>
      </div>
      <h2 class="device-name">{{ device.name }}</h2>
      <p class="device-manufacturer">{{ device.manufacturer }}</p>
      <div class="device-specs">
        <span>{{ device.operatingSystem }} {{ device.osVersion }}</span>
        <span>{{ device.ramAmount }}</span>
      </div>
      <div class="device-user" *ngIf="device.user">
        <span class="user-icon">👤</span>
        <span>{{ device.user.name }}</span>
      </div>
      <div class="device-user unassigned" *ngIf="!device.user">
        <span>Unassigned</span>
      </div>
      <div class="card-actions">
        <button class="btn-secondary btn-sm" (click)="viewDevice(device.id)">View</button>
        <button class="btn-primary btn-sm" (click)="editDevice(device.id)">Edit</button>
      </div>
    </div>
  </div>
</div>

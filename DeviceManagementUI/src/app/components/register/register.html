<div class="auth-container">
  <div class="auth-card card">
    <div class="auth-header">
      <span class="auth-icon">📱</span>
      <h1>Device Management</h1>
      <p>Create your account</p>
    </div>

    @if (errorMessage) {
      <div class="alert alert-error">{{ errorMessage }}</div>
    }

    @if (successMessage) {
      <div class="alert alert-success">{{ successMessage }}</div>
    }

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm your password" />
    </div>

    <button class="btn-primary btn-full" (click)="onSubmit()" [disabled]="loading">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>

    <div class="auth-footer">
      <p>Already have an account? <span class="link" (click)="goToLogin()">Sign In</span></p>
    </div>
  </div>
</div>
